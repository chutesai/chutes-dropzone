<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chutes Dropzone</title>
    <meta
      name="description"
      content="A Chutes-powered private AI workspace with Chat and Automations under one roof."
    />
    <link rel="stylesheet" href="/_dropzone/styles.css?v=dropzone-20260323c" />
  </head>
  <body
    data-install-mode="local"
    data-traffic-mode="e2ee-proxy"
    data-dropzone-host="e2ee-local-proxy.chutes.dev"
  >
    <div class="page-shell">
      <div class="grid-veil" aria-hidden="true"></div>
      <div class="noise-veil" aria-hidden="true"></div>
      <div class="ambient ambient-moss"></div>
      <div class="ambient ambient-papaya"></div>
      <div class="ambient ambient-mountain"></div>
      <div class="ambient ambient-banana"></div>

      <div class="page-frame">
        <header class="dropzone-header" aria-label="Chutes Dropzone">
          <div class="dropzone-brand">
            <img
              class="dropzone-logo"
              src="/_dropzone/assets/chutes-logo.svg?v=dropzone-20260323c"
              alt="Chutes"
            />
            <div class="dropzone-brand-copy">
              <h1>Chutes Dropzone</h1>
            </div>
          </div>
        </header>

        <main class="launch-stage cards-only" aria-label="Launch applications">
          <a class="launch-card chat-card" href="/chat/">
            <div class="card-topline">
              <div>
                <p class="card-kicker">Chat workspace</p>
                <h2 class="product-name product-name-chat">Chutes Chat</h2>
              </div>
              <span class="route-pill">/chat/</span>
            </div>
            <div class="card-art">
              <img src="/_dropzone/assets/chat-panel.svg?v=dropzone-20260322c" alt="" />
            </div>
            <div class="card-copy">
              <p>Private AI chat, models, files, and fast iteration in one surface.</p>
            </div>
            <div class="card-footer">
              <span>Launch Chat</span>
              <span aria-hidden="true">→</span>
            </div>
          </a>

          <a class="launch-card n8n-card" href="/n8n/">
            <div class="card-topline">
              <div>
                <p class="card-kicker">Automation studio</p>
                <h2 class="product-name product-name-n8n">n8n w/Chutes</h2>
              </div>
              <span class="route-pill">/n8n/</span>
            </div>
            <div class="card-art">
              <img src="/_dropzone/assets/n8n-panel.svg?v=dropzone-20260322c" alt="" />
            </div>
            <div class="card-copy">
              <p>Agents, automations, integrations, and durable workflows behind the same edge.</p>
            </div>
            <div class="card-footer">
              <span>Launch Automations</span>
              <span aria-hidden="true">→</span>
            </div>
          </a>
        </main>
      </div>
    </div>
    <script src="/_dropzone/app.js?v=dropzone-20260323a" defer></script>
  </body>
</html>
