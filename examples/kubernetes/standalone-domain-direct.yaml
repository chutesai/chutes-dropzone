apiVersion: v1
kind: Secret
metadata:
  name: chutes-dropzone-env
type: Opaque
stringData:
  INSTALL_MODE: "domain"
  CHUTES_TRAFFIC_MODE: "direct"
  DROPZONE_ENABLE_PUBLIC_LANDING: "false"
  DROPZONE_HOST: "chat.chutes.ai"
  # Caddy manages a Let's Encrypt certificate by default.
  # Clear ACME_EMAIL to disable TLS and listen on HTTP only
  # (useful when TLS is handled upstream by an ingress or load balancer).
  ACME_EMAIL: "ops@chutes.ai"

  # Chutes OAuth — create an app at https://chutes.ai/app/settings/apps
  CHUTES_OAUTH_CLIENT_ID: "REPLACE_ME"
  CHUTES_OAUTH_CLIENT_SECRET: "REPLACE_ME"
  CHUTES_SSO_SCOPES: "openid profile chutes:read chutes:invoke"

  # Per-service secrets — generate unique values for each (e.g. openssl rand -hex 32)
  N8N_ENCRYPTION_KEY: "REPLACE_ME_64_HEX"
  N8N_JWT_SECRET: "REPLACE_ME_64_HEX"
  WEBUI_SECRET_KEY: "REPLACE_ME_64_HEX"

  # Per-service database credentials — each service gets its own user
  POSTGRES_N8N_USER: "dropzone_n8n"
  POSTGRES_N8N_PASSWORD: "REPLACE_ME_32_HEX"
  POSTGRES_OPENWEBUI_USER: "dropzone_owui"
  POSTGRES_OPENWEBUI_PASSWORD: "REPLACE_ME_32_HEX"

  # Internal service account — password auth is disabled; this admin is only
  # used by background sync scripts and is never exposed via the SSO login flow.
  N8N_ADMIN_EMAIL: "svc-dropzone@internal.chutes.local"
  N8N_ADMIN_PASSWORD: "REPLACE_ME"
  OPENWEBUI_ADMIN_NAME: "Dropzone Service Account"
  OPENWEBUI_ADMIN_EMAIL: "svc-dropzone@internal.chutes.local"
  OPENWEBUI_ADMIN_PASSWORD: "REPLACE_ME"

  OPENWEBUI_NAME: "Chutes Chat"
  OPENWEBUI_API_BASE_URL: "https://llm.chutes.ai/v1"
  OPENWEBUI_API_KEY: ""
  OPENWEBUI_MODELS_CACHE_TTL: "300"
  OPENWEBUI_MODEL_ORDER_SYNC_INTERVAL: "300"

  ALLOW_NON_CONFIDENTIAL: "false"
  CHUTES_SSO_PROXY_BYPASS: "false"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chutes-dropzone-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chutes-dropzone
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: chutes-dropzone
  template:
    metadata:
      labels:
        app: chutes-dropzone
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: chutes-dropzone
          image: "ghcr.io/chutesai/chutes-dropzone:<release-tag>"
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: chutes-dropzone-env
          ports:
            - name: http
              containerPort: 80
            - name: https
              containerPort: 443
          readinessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 60
            periodSeconds: 20
          # If ACME_EMAIL is cleared (TLS handled upstream), change the
          # probes and Service to target port "http" instead of "https"
          # and remove the https containerPort above.
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "6Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: chutes-dropzone-data
---
apiVersion: v1
kind: Service
metadata:
  name: chutes-dropzone
spec:
  type: LoadBalancer
  selector:
    app: chutes-dropzone
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: https
      port: 443
      targetPort: https
