worker_processes 1;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

env ALLOW_NON_CONFIDENTIAL;

events {
    worker_connections 1024;
}

http {
    resolver __RESOLVERS__ valid=60s ipv6=off;
    resolver_timeout 5s;

    lua_package_path "/usr/local/openresty/lua/?.lua;;";
    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    lua_ssl_verify_depth 5;

    lua_shared_dict e2ee_cache 10m;

    init_worker_by_lua_block {
        local crypto = require("e2ee_crypto")
        local ok, err = crypto.init()
        if not ok then
            ngx.log(ngx.ERR, "FATAL: e2ee_init failed: ", err)
        else
            ngx.log(ngx.INFO, "e2ee proxy library initialized")
        end
    }

    server {
        listen 80;
        server_name __SERVER_NAME__;

        client_max_body_size 10m;
        client_body_buffer_size 1m;

        more_set_headers 'Access-Control-Allow-Origin: *';
        more_set_headers 'Access-Control-Allow-Methods: GET, POST, PUT, DELETE, PATCH, OPTIONS';
        more_set_headers 'Access-Control-Allow-Headers: *';
        more_set_headers 'Access-Control-Expose-Headers: *';

        location @cors_preflight {
            more_set_headers 'Access-Control-Allow-Origin: *';
            more_set_headers 'Access-Control-Allow-Methods: GET, POST, PUT, DELETE, PATCH, OPTIONS';
            more_set_headers 'Access-Control-Allow-Headers: *';
            more_set_headers 'Access-Control-Max-Age: 86400';
            more_set_headers 'Content-Length: 0';
            return 204;
        }

        location = /health {
            content_by_lua_block {
                ngx.header.content_type = "application/json"
                ngx.say('{"status":"ok"}')
            }
        }

        location = /v1/models {
            if ($request_method = 'OPTIONS') {
                more_set_headers 'Access-Control-Allow-Origin: *';
                more_set_headers 'Access-Control-Allow-Methods: GET, HEAD, OPTIONS';
                more_set_headers 'Access-Control-Allow-Headers: *';
                more_set_headers 'Access-Control-Max-Age: 86400';
                more_set_headers 'Content-Length: 0';
                return 204;
            }

            content_by_lua_block {
                local handler = require("model_catalog")
                handler.handle()
            }
        }

        location = /v1/messages {
            if ($request_method = 'OPTIONS') {
                more_set_headers 'Access-Control-Allow-Origin: *';
                more_set_headers 'Access-Control-Allow-Methods: GET, POST, OPTIONS';
                more_set_headers 'Access-Control-Allow-Headers: *';
                more_set_headers 'Access-Control-Max-Age: 86400';
                more_set_headers 'Content-Length: 0';
                return 204;
            }

            more_set_headers 'X-Dropzone-Proxy: e2ee-proxy';

            content_by_lua_block {
                local handler = require("claude_handler")
                handler.handle()
            }
        }

        location = /v1/responses {
            if ($request_method = 'OPTIONS') {
                more_set_headers 'Access-Control-Allow-Origin: *';
                more_set_headers 'Access-Control-Allow-Methods: GET, POST, OPTIONS';
                more_set_headers 'Access-Control-Allow-Headers: *';
                more_set_headers 'Access-Control-Max-Age: 86400';
                more_set_headers 'Content-Length: 0';
                return 204;
            }

            more_set_headers 'X-Dropzone-Proxy: e2ee-proxy';

            content_by_lua_block {
                local handler = require("responses_handler")
                handler.handle()
            }
        }

        location /v1/ {
            if ($request_method = 'OPTIONS') {
                more_set_headers 'Access-Control-Allow-Origin: *';
                more_set_headers 'Access-Control-Allow-Methods: GET, POST, OPTIONS';
                more_set_headers 'Access-Control-Allow-Headers: *';
                more_set_headers 'Access-Control-Max-Age: 86400';
                more_set_headers 'Content-Length: 0';
                return 204;
            }

            more_set_headers 'X-Dropzone-Proxy: e2ee-proxy';

            content_by_lua_block {
                local handler = require("e2ee_handler")
                handler.handle()
            }
        }

        location / {
            default_type application/json;
            return 404 '{"error":"use /v1/ endpoints"}';
        }
    }
}
