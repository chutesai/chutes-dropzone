services:
  caddy:
    image: ${CADDY_IMAGE:-caddy:2.11.2-alpine@sha256:a1b7e624f860619cea121bdbc5dec2e112401666298c6507c6793b0a3ee6fc8e}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./landing:/srv/landing:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      n8n:
        condition: service_healthy
      openwebui:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      dropzone-net:
        aliases:
          - ${DROPZONE_HOST}
    restart: unless-stopped

volumes:
  caddy_config:
  caddy_data:
