name: CI

concurrency:
  group: chutes-dropzone-ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - master
      - DEV
      - "beta-*"
  pull_request:
  workflow_call:
  workflow_dispatch:

env:
  N8N_NODES_CHUTES_REPO: sirouk/n8n-nodes-chutes
  N8N_NODES_CHUTES_REF: d98eb1c02e966a99eb0c8ce66434feaa2c9049c3

jobs:
  syntax-smoke:
    name: Syntax Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout chutes-dropzone
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run syntax smoke checks
        run: ./scripts/smoke-test.sh --syntax

      - name: Validate release helper
        run: ./release.sh --dry-run

  local-e2e:
    name: Local E2E (Test IdP)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: syntax-smoke

    steps:
      - name: Checkout chutes-dropzone
        uses: actions/checkout@v6
        with:
          path: chutes-dropzone

      - name: Checkout n8n-nodes-chutes
        uses: actions/checkout@v6
        with:
          repository: ${{ env.N8N_NODES_CHUTES_REPO }}
          ref: ${{ env.N8N_NODES_CHUTES_REF }}
          path: n8n-nodes-chutes

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Prepare n8n-nodes-chutes build context
        run: |
          mkdir -p chutes-dropzone/build/n8n-nodes-chutes
          rsync -a --delete \
            --exclude node_modules \
            --exclude .git \
            --exclude tests \
            --exclude coverage \
            n8n-nodes-chutes/ chutes-dropzone/build/n8n-nodes-chutes/
          node chutes-dropzone/scripts/patch-n8n-nodes-chutes.mjs chutes-dropzone/build/n8n-nodes-chutes

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prebuild n8n runtime image
        uses: docker/build-push-action@v6
        with:
          context: chutes-dropzone
          file: chutes-dropzone/Dockerfile.local-repo
          target: n8n-runtime
          load: true
          tags: chutes-dropzone-ci-n8n:latest
          cache-from: type=gha,scope=local-e2e-n8n-runtime
          cache-to: type=gha,mode=max,scope=local-e2e-n8n-runtime

      - name: Prebuild OpenWebUI runtime image
        uses: docker/build-push-action@v6
        with:
          context: chutes-dropzone
          file: chutes-dropzone/Dockerfile.local-repo
          target: openwebui-runtime
          load: true
          tags: chutes-dropzone-ci-openwebui:latest
          cache-from: type=gha,scope=local-e2e-openwebui-runtime
          cache-to: type=gha,mode=max,scope=local-e2e-openwebui-runtime

      - name: Run destructive test-IdP E2E
        working-directory: chutes-dropzone
        env:
          DROPZONE_N8N_IMAGE: chutes-dropzone-ci-n8n:latest
          DROPZONE_OPENWEBUI_IMAGE: chutes-dropzone-ci-openwebui:latest
          SKIP_APP_BUILDS: "true"
        run: ./scripts/e2e-test.sh
